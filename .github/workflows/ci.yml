name: Credit Risk CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_API_REPO: credit-risk-api
  ECR_DASH_REPO: credit-risk-dashboard
  ECS_CLUSTER: credit-risk-cluster

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: loan_risk_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Lint check
        run: |
          pip install ruff
          ruff check src/ app/ tests/ --ignore E501

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t credit-risk-api .

      - name: Build Dashboard image
        run: docker build --target dashboard -t credit-risk-dashboard .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build --target api -t $ECR_REGISTRY/$ECR_API_REPO:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_API_REPO:${{ github.sha }}
          docker tag $ECR_REGISTRY/$ECR_API_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_API_REPO:latest
          docker push $ECR_REGISTRY/$ECR_API_REPO:latest

      - name: Build, tag, and push Dashboard image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build --target dashboard -t $ECR_REGISTRY/$ECR_DASH_REPO:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_DASH_REPO:${{ github.sha }}
          docker tag $ECR_REGISTRY/$ECR_DASH_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_DASH_REPO:latest
          docker push $ECR_REGISTRY/$ECR_DASH_REPO:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service credit-risk-api \
            --force-new-deployment --region $AWS_REGION
          aws ecs update-service --cluster $ECS_CLUSTER --service credit-risk-dashboard \
            --force-new-deployment --region $AWS_REGION

      - name: Wait for stability
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER \
            --services credit-risk-api credit-risk-dashboard --region $AWS_REGION
